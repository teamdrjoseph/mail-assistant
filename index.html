<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM DR JOSEPH · E-Mail Assistent</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Barlow:wght@300;400&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cream: #F5F0E8; 
            --warm-white: #FAF8F4; 
            --gold: #B8976A; 
            --charcoal: #2C2C2C; 
            --border: #E0D8CE; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Barlow', sans-serif; 
            background-color: var(--cream); 
            color: var(--charcoal); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
        }

        .container { 
            background: var(--warm-white); 
            padding: 80px 50px; 
            border: 1px solid var(--border); 
            max-width: 650px; 
            width: 90%; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.04); 
        }

        /* Präziser Logo-Nachbau TEAM DR JOSEPH */
        .logo-area {
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 48px;
            letter-spacing: 0.4em;
            font-weight: 500;
            text-transform: uppercase;
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 5px;
            padding-left: 0.4em; /* Optischer Ausgleich für Letter-Spacing rechts */
        }

        .logo-text span {
            font-size: 26px;
            margin: 0 4px;
            position: relative;
            top: -14px; /* Hochgestelltes R */
            font-weight: 600;
        }

        .logo-underline {
            width: 100%;
            height: 1px;
            background-color: var(--charcoal);
        }

        .brand-header { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 26px; 
            letter-spacing: 0.3em; 
            text-transform: uppercase; 
            margin-top: 40px;
            margin-bottom: 12px; 
            font-weight: 400; 
        }

        .brand-sub { 
            font-family: 'Barlow Condensed', sans-serif; 
            font-size: 14px; 
            letter-spacing: 0.4em; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: 50px; 
        }

        .btn-launch { 
            display: inline-block; 
            background: var(--charcoal); 
            color: white; 
            text-decoration: none; 
            font-family: 'Barlow Condensed', sans-serif; 
            font-size: 15px; 
            letter-spacing: 0.25em; 
            text-transform: uppercase; 
            padding: 22px 60px; 
            transition: all 0.3s ease; 
            border: 1px solid var(--charcoal); 
            cursor: pointer; 
        }

        .btn-launch:hover { 
            background: transparent; 
            color: var(--charcoal); 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <div class="logo-text">TEAM D<span>R</span> JOSEPH</div>
            <div class="logo-underline"></div>
        </div>
        
        <div class="brand-header">E-Mail Assistent</div>
        <div class="brand-sub">Smart Communication Tool</div>
        
        <a href="https://claude.ai/artifacts/a1340544-3bb5-4d8d-89c1-6ae4b0a1d0d4" class="btn-launch">
            Assistent starten
        </a>
    </div>

</body>
</html>
