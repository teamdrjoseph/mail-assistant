<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM DR JOSEPH · Mail Assistant</title>
    <style>
        /*
         * MONUMENT GROTESK – Font-Dateien selbst hosten
         *   MonumentGrotesk-Regular.woff2 / .woff
         *   MonumentGrotesk-Bold.woff2 / .woff
         */
        @font-face {
            font-family: 'Monument Grotesk';
            src: url('MonumentGrotesk-Regular.woff2') format('woff2'),
                 url('MonumentGrotesk-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Monument Grotesk';
            src: url('MonumentGrotesk-Bold.woff2') format('woff2'),
                 url('MonumentGrotesk-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        /*
         * AKKURAT PRO – Font-Dateien selbst hosten
         *   AkkuratPro-Regular.woff2 / .woff
         *   AkkuratPro-Bold.woff2 / .woff
         *   AkkuratPro-Light.woff2 / .woff
         */
        @font-face {
            font-family: 'Akkurat Pro';
            src: url('AkkuratPro-Regular.woff2') format('woff2'),
                 url('AkkuratPro-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Akkurat Pro';
            src: url('AkkuratPro-Bold.woff2') format('woff2'),
                 url('AkkuratPro-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Akkurat Pro';
            src: url('AkkuratPro-Light.woff2') format('woff2'),
                 url('AkkuratPro-Light.woff') format('woff');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-main: #DED8D1; /*dunkel*/
            --bg-container: #E9E6E2; /*dunkel*/
            --charcoal: #2C2C2C;
            --white: #ffffff;
            --border: #DED8D1; /*dunkel - IDEM body/main*/
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Akkurat Pro', sans-serif;
            background-color: var(--bg-main);
            color: var(--charcoal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-container);
            padding: 80px 50px;
            border: 1px solid var(--border);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .title-main {
            font-family: 'Akkurat Pro', sans-serif;
            font-weight: 700;
            font-size: 30px;
            letter-spacing: 0;
            word-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .title-sub {
            font-family: 'Monument Grotesk', 'Akkurat Pro', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 40px;
        }

        .button-link {
            display: inline-block;
            font-family: 'Monument Grotesk', 'Akkurat Pro', sans-serif;
            background: var(--charcoal);
            color: var(--white);
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 14px 48px;
            transition: background 0.2s, transform 0.1s;
            border-radius: 1px;
        }

        .button-link:hover { background: #1a1a1a; }
        .button-link:active { transform: scale(0.99); }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-main">E-Mail   Assistant</div>
        <div class="title-sub">Smart Communication Tool</div>
        <a class="button-link" href="https://claude.ai/artifacts/26985430-9c3b-4243-99b6-31981c45d56e">
            Starten
        </a>
    </div>
</body>
</html>
