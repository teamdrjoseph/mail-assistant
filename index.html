<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM DR JOSEPH · Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5F0E8;
            --warm-white: #FAF8F4;
            --gold: #B8976A;
            --charcoal: #2C2C2C;
            --border: #E0D8CE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--warm-white);
            padding: 80px 50px;
            border: 1px solid var(--border);
            max-width: 600px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            text-align: center;
        }
        .title-main {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #2C2C2C;
            margin-bottom: 10px;
        }
        .title-sub {
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 0.3em;
            color: #B8976A;
            margin-bottom: 50px;
        }
        .button-link {
            display: inline-block;
            font-family: 'Barlow Condensed', sans-serif;
            background: var(--charcoal);
            color: var(--cream);
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 14px 48px;
            transition: background 0.2s, transform 0.1s;
            border-radius: 1px;
        }
        .button-link:hover { background: #1a1a1a; }
        .button-link:active { transform: scale(0.99); }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-main">E-Mail Assistant</div>
        <div class="title-sub">Smart Communication Tool</div>
        <a class="button-link" href="https://claude.ai/artifacts/f71a7dd3-0fc0-4683-962d-d1954f12a0f2">
            Starten
        </a>
    </div>
</body>
</html>
