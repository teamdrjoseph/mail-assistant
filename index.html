    <style>
        :root { 
            --cream: #F5F0E8; 
            --warm-white: #FAF8F4; 
            --gold: #B8976A; 
            --charcoal: #2C2C2C; 
            --border: #E0D8CE; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Barlow', sans-serif; 
            background-color: var(--cream); 
            color: var(--charcoal); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container { 
            background: var(--warm-white); 
            padding: 80px 50px; 
            border: 1px solid var(--border); 
            max-width: 600px; 
            width: 90%; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.04); 
            text-align: center;
        }

        .logo-section {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Das Logo als unzerstörbares Bild-Element */
        .logo-image {
            width: 100%;
            max-width: 420px;
            height: auto;
            display: block;
        }

        .line-separator {
            width: 100%;
            height: 1px;
            background-color: var(--charcoal);
            margin-top: 15px;
            margin-bottom: 50px;
        }

        .title-main { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 26px; 
            letter-spacing: 0.35em; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            font-weight: 400; 
        }

        .title-sub { 
            font-family: 'Barlow Condensed', sans-serif; 
            font-size: 14px; 
            letter-spacing: 0.45em; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: 55px; 
        }

        .button-link { 
            display: inline-block; 
            background: var(--charcoal); 
            color: white !important; 
            text-decoration: none; 
            font-family: 'Barlow Condensed', sans-serif; 
            font-size: 14px; 
            letter-spacing: 0.3em; 
            text-transform: uppercase; 
            padding: 22px 65px; 
            transition: all 0.3s ease; 
            border: 1px solid var(--charcoal); 
        }

        .button-link:hover { 
            background: transparent; 
            color: var(--charcoal) !important; 
        }
    </style>
</head>
