<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM DR JOSEPH · Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5F0E8;
            --warm-white: #FAF8F4;
            --gold: #B8976A;
            --charcoal: #2C2C2C;
            --border: #E0D8CE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--warm-white);
            padding: 80px 50px;
            border: 1px solid var(--border);
            max-width: 600px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            text-align: center;
        }
        .title-main {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #2C2C2C;
            margin-bottom: 10px;
        }
        .title-sub {
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 0.3em;
            color: #B8976A;
            margin-bottom: 50px;
        }
        .button-link {
            display: inline-block;
            background: #2C2C2C;
            color: white;
            text-decoration: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            padding: 22px 65px;
            transition: all 0.3s ease;
            border: 1px solid #2C2C2C;
        }
        .button-link:hover {
            background: transparent;
            color: #2C2C2C;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-main">E-Mail Assistant</div>
        <div class="title-sub">Smart Communication Tool</div>
        <a href="https://claude.ai/artifacts/94c8c944-886e-4150-b6ec-3720f0c46433" class="button-link">
            Starten
        </a>
    </div>
</body>
</html>
