<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM DR JOSEPH · mail assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Hintergrund der Seite */
            --bg-main: #DED8D1; 
            /* Hintergrund der Box  */
            --bg-container: #E9E6E2; 
            --black: #000000;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Akkurat Pro', sans-serif;
            background-color: var(--bg-main);
            color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-container);
            padding: 80px 50px;
            border: 1px solid rgba(0,0,0,0.05); /* Ganz feiner Rahmen */
            max-width: 600px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            text-align: center;
        }

        .title-main {
            font-family: 'Akkurat Pro', sans-serif;
            font-weight: 900;
            font-size: 30px;
            letter-spacing: 0.0em;
            text-transform: uppercase;
            color: #2C2C2C;
            margin-bottom: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .title-sub {
            font-family: 'MonumentGrotesk', sans-serif;
            font-weight: 300;
            font-size: 12px;
            letter-spacing: 0.00em;
             text-transform: uppercase;
            color: #2C2C2C;
            margin-bottom: 20px;
        }

        .button-link {
            display: inline-block;
            background: var(--black);
            color: var(--white); /* Schrift auf dem Button ist jetzt weiß */
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 16px 50px;
            transition: all 0.2s;
            border-radius: 0px;
        }

        .button-link:hover {
            background: #222222;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-main">E-Mail Assistant</div>
        <div class="title-sub">Smart Communication Tool</div>
        <a class="button-link" href="https://claude.ai/artifacts/b68bf169-e43f-4a41-9de5-b499e364b2db">
            Starten
        </a>
    </div>

</body>
</html>
