            --warm-white: #FAF8F4; 
            --gold: #B8976A; 
            --charcoal: #2C2C2C; 
            --border: #E0D8CE; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Barlow', sans-serif; 
            background-color: var(--cream); 
            color: var(--charcoal); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
        }

        .main-portal-container { 
            background: var(--warm-white); 
            padding: 80px 50px; 
            border: 1px solid var(--border); 
            max-width: 600px; 
            width: 90%; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.04); 
        }

        .brand-visual-area {
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        }

        .separator-line {
            width: 100%;
            height: 1.2px;
            background-color: var(--charcoal);
            margin-top: 15px;
            margin-bottom: 50px;
        }

        .assistant-headline { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 26px; 
            letter-spacing: 0.35em; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            font-weight: 400; 
        }

        .assistant-subline { 
            font-family: 'Barlow Condensed', sans-serif; 
            font-size: 14px; 
            letter-spacing: 0.45em; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: 55px; 
        }

        .launch-action-button { 
            display: inline-block; 
            background: var(--charcoal); 
            color: white; 
            text-decoration: none; 
            font-family: 'Barlow Condensed', sans-serif; 
            font-size: 14px; 
            letter-spacing: 0.3em; 
            text-transform: uppercase; 
            padding: 22px 65px; 
            transition: all 0.3s ease; 
            border: 1px solid var(--charcoal); 
            cursor: pointer; 
        }

        .launch-action-button:hover { 
            background: transparent; 
            color: var(--charcoal); 
            transform: translateY(-2px);
        }

    <div class="main-portal-container">
        <div class="brand-visual-area">
            <div class="final-logo-display"></div>
            <div class="separator-line"></div>
        </div>
        
        <div class="assistant-headline">E-Mail Assistent</div>
        <div class="assistant-subline">Smart Communication Tool</div>
        
        <a href="https://claude.ai/artifacts/a1340544-3bb5-4d8d-89c1-6ae4b0a1d0d4" class="launch-action-button">
